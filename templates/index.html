<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>URJA AI</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body{font-family:system-ui;background:#0f172a;color:#e2e8f0;margin:18px}
    .card{background:#1e293b;padding:12px;border-radius:8px;margin-bottom:10px}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    canvas{background:#111827;border-radius:8px}
  </style>
</head>
<body>
  <h2>URJA AI - Analytics Endpoints</h2>
  <div class="row">
    <div class="card">Status: <span id="s">..</span></div>
    <div class="card">R²: <span id="r2">..</span></div>
    <div class="card">MAPE: <span id="mape">..</span></div>
  </div>
  <div class="card"><canvas id="main" height="120"></canvas></div>
  <div class="card"><canvas id="annual" height="90"></canvas></div>

<script>
let c1, c2;
async function boot(){
  const st = await (await fetch('/api/status')).json();
  document.getElementById('s').innerText = st.status + ' (' + (st.model_dir || '-') + ')';

  const me = await (await fetch('/api/metrics')).json();
  document.getElementById('r2').innerText = me.r2 ? me.r2.toFixed(4) : '-';
  document.getElementById('mape').innerText = me.mape ? (me.mape*100).toFixed(2) + '%' : '-';

  const h = await (await fetch('/api/historical?months=36')).json();
  const f = await (await fetch('/api/forecast?months=12')).json();

  const labels = [...h.timestamps, ...f.timestamps];
  const hist = [...h.values, ...new Array(f.timestamps.length).fill(null)];
  const fore = [...new Array(h.timestamps.length).fill(null), ...f.predictions];

  c1 = new Chart(document.getElementById('main'), {
    type:'line',
    data:{labels,datasets:[{label:'Historical',data:hist,borderColor:'#22d3ee'},{label:'Forecast',data:fore,borderColor:'#f59e0b'}]}
  });

  const a = await (await fetch('/api/annual')).json();
  c2 = new Chart(document.getElementById('annual'), {
    type:'bar',
    data:{labels:a.fiscal_years,datasets:[{label:'Demand (TWh)',data:a.demand_twh,backgroundColor:'#38bdf8'}]}
  });
}
boot();
</script>
</body>
</html>
