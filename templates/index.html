<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>URJA AI - Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #0f172a; color: #e2e8f0; }
    .row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .card { background: #1e293b; padding: 10px 14px; border-radius: 8px; }
    button, select { padding: 8px 10px; }
    .box { background: #1e293b; padding: 12px; border-radius: 8px; margin-top: 10px; }
  </style>
</head>
<body>
  <h2>URJA AI - Dashboard</h2>
  <div class="row">
    <div class="card">Status: <span id="status">...</span></div>
    <div class="card">Rows: <span id="rows">...</span></div>
  </div>

  <div class="row">
    <select id="months">
      <option value="6">6 months</option>
      <option value="12" selected>12 months</option>
      <option value="24">24 months</option>
    </select>
    <button onclick="loadData()">Generate Forecast</button>
  </div>

  <div class="box"><canvas id="chart" height="120"></canvas></div>

  <script>
    let chart;

    async function loadStatus() {
      const res = await fetch('/api/status');
      const data = await res.json();
      document.getElementById('status').innerText = data.status;
      document.getElementById('rows').innerText = data.data_points;
    }

    async function loadData() {
      const m = document.getElementById('months').value;
      const h = await (await fetch('/api/historical?months=36')).json();
      const f = await (await fetch('/api/forecast?months=' + m)).json();

      const labels = [...h.timestamps, ...f.timestamps];
      const histVals = [...h.values, ...new Array(f.timestamps.length).fill(null)];
      const fVals = [...new Array(h.timestamps.length).fill(null), ...f.predictions];

      if (chart) chart.destroy();
      chart = new Chart(document.getElementById('chart'), {
        type: 'line',
        data: {
          labels,
          datasets: [
            { label: 'Historical', data: histVals, borderColor: '#38bdf8', fill: false },
            { label: 'Forecast', data: fVals, borderColor: '#f59e0b', fill: false }
          ]
        }
      });
    }

    loadStatus();
    loadData();
  </script>
</body>
</html>
